<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" href="image (14).png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Accessibility Rules Dashboard</title>

<style>
* {
box-sizing: border-box;
}

body {
font-family: Arial, sans-serif;
margin: 0;
background: #eef3ff;
color: #1f2937;
}

.app {
display: flex;
min-height: 100vh;
}

.sidebar {
width: 270px;
background: #f6f8ff;
border-right: 1px solid #d9e1f2;
padding: 20px;
position: fixed;
top: 0;
bottom: 0;
overflow-y: auto;
}

.logo {
font-size: 22px;
font-weight: bold;
margin-bottom: 5px;
}

.subtitle {
font-size: 13px;
color: #718096;
margin-bottom: 25px;
}

.nav-title {
font-size: 13px;
font-weight: bold;
margin: 20px 0 10px;
color: #4a5568;
}

.rule-link {
display: block;
padding: 10px 12px;
margin-bottom: 6px;
border-radius: 10px;
text-decoration: none;
color: #334155;
font-size: 14px;
}

.rule-link:hover,
.rule-link:focus {
background: #e4e9ff;
outline: 2px solid #5468ff;
outline-offset: 2px;
}

.main {
margin-left: 270px;
width: calc(100% - 270px);
}

.topbar {
height: 70px;
background: white;
display: flex;
align-items: center;
justify-content: space-between;
padding: 0 28px;
box-shadow: 0 2px 10px rgba(0,0,0,.08);
position: sticky;
top: 0;
z-index: 1000;
}

.search-wrapper {
width: 420px;
max-width: 60%;
}

.search-label {
display: block;
font-weight: bold;
font-size: 14px;
margin-bottom: 6px;
}

.search {
width: 100%;
padding: 13px 18px;
border: 1px solid #d4dbea;
border-radius: 8px;
font-size: 15px;
}

.content {
padding: 30px 34px;
}

h1 {
font-size: 34px;
margin: 0 0 8px;
}

.description {
color: #64748b;
margin-bottom: 30px;
}

.cards {
display: grid;
grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
gap: 18px;
max-width: 800px;
margin-bottom: 30px;
}

.card {
background: white;
border-radius: 14px;
padding: 22px;
box-shadow: 0 8px 20px rgba(31,41,55,.08);
}

.card-number {
font-size: 34px;
font-weight: bold;
color: #5468ff;
}

.card-label {
font-weight: bold;
margin-top: 8px;
}

.panel {
background: white;
border-radius: 14px;
padding: 24px;
box-shadow: 0 8px 20px rgba(31,41,55,.08);
}

.rules-grid {
display: grid;
grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
gap: 16px;
margin-top: 20px;
}

.rule-card {
background: #f8fbff;
border: 1px solid #dbe5f6;
border-radius: 14px;
padding: 16px;
}

.rule-card h2 {
font-size: 17px;
margin: 0 0 12px;
}

.actions {
display: flex;
gap: 10px;
}

.btn {
flex: 1;
text-align: center;
text-decoration: none;
padding: 10px;
border-radius: 8px;
color: white;
font-weight: bold;
font-size: 14px;
}

.btn:focus {
outline: 3px solid #1f2937;
outline-offset: 2px;
}

.success {
background: #28a745;
}

.failure {
background: #dc3545;
}

.visually-hidden {
position: absolute;
width: 1px;
height: 1px;
padding: 0;
margin: -1px;
overflow: hidden;
clip: rect(0, 0, 0, 0);
white-space: nowrap;
border: 0;
}

@media (max-width: 800px) {
.sidebar {
position: static;
width: 100%;
height: auto;
}

.app {
display: block;
}

.main {
margin-left: 0;
width: 100%;
}

.topbar {
height: auto;
gap: 12px;
flex-direction: column;
align-items: stretch;
padding: 16px;
}

.search-wrapper {
max-width: 100%;
width: 100%;
}
}
</style>
</head>

<body>
<div class="app">

<aside class="sidebar" aria-label="Rules sidebar">
<header>
<div class="logo">AccessFlow</div>
<p class="subtitle">QA Testing</p>
</header>

<nav aria-label="Dashboard navigation">
<p class="nav-title">Dashboard</p>
<a class="rule-link" href="index.html">Rule Library</a>
</nav>

<nav aria-label="Engine rules navigation">
<p class="nav-title">Engine Rules</p>
<div id="sidebarRules"></div>
</nav>
</aside>

<div class="main">

<header class="topbar">
<form role="search" aria-label="Search accessibility rules">
<div class="search-wrapper">
<label class="search-label" for="searchInput">Search rule by name</label>
<input id="searchInput" class="search" type="search" placeholder="Search rule by name..." autocomplete="off">
</div>
</form>
</header>

<main id="mainContent" class="content">
<section aria-labelledby="pageTitle">
<h1 id="pageTitle">Rule Library</h1>
<p class="description">Browse, test, and validate accessibility rule examples.</p>

<section class="cards" aria-label="Dashboard summary">
<article class="card">
<div class="card-number" id="totalRules">0</div>
<div class="card-label">Total Rules</div>
</article>

<article class="card">
<div class="card-number" aria-label="Success examples">Success</div>
<div class="card-label">Success Examples</div>
</article>

<article class="card">
<div class="card-number" aria-label="Failure examples">Failure</div>
<div class="card-label">Failure Examples</div>
</article>

<article class="card">
<div class="card-number" aria-label="Search enabled">Search</div>
<div class="card-label">Search Enabled</div>
</article>
</section>

<section class="panel" aria-labelledby="jumpToRuleTitle">
<h2 id="jumpToRuleTitle">Jump to Rule</h2>
<div id="rulesGrid" class="rules-grid"></div>
</section>
</section>
</main>

</div>
</div>

<script>
const rules = [
{ name: 'Hidden Visible Content', success: 'hiddenVisibleContentSuccess.html', failure: 'hiddenVisibleContentFailure.html' },
{ name: 'Empty Links', success: 'emptyLinksSuccesses.html', failure: 'emptyLinksFailures.html' },
{ name: 'Untagged Headings', success: 'untaggedHeadingsSuccess.html', failure: 'untaggedHeadingsFailures.html' },
{ name: 'New Window Link', success: 'newWindowLinkSuccess.html', failure: 'newWindowLinkFailures.html' },
{ name: 'Font Size', failure: 'fontSizeFailures.html' },
{ name: 'Missing Form Button', success: 'missingFormButtonSuccess.html', failure: 'missingFormButtonFailures.html' },
{ name: 'Broken List', success: 'brokenListSuccess.html', failure: 'brokenListFailures.html' },
{ name: 'Fake Hidden Interactive', success: 'fakeHiddenInteractiveSuccess.html', failure: 'fakeHiddenInteractiveFailures.html' },
{ name: 'Popup Focus', success: 'popupFocusSuccess.html', failure: 'popupFocusFailures.html' },
{ name: 'Headless Tables', success: 'headlessTablesSuccess.html', failure: 'headlessTablesFailures.html' },
{ name: 'Skip Links', success: 'skipLinksSuccess.html', failure: 'skipLinksFailures.html' },
{ name: 'Carousel Pagination', success: 'carouselPaginationSuccess.html', failure: 'carouselPaginationFailures.html' },
{ name: 'Article Setup', success: 'articleSetupSuccess.html', failure: 'articleSetupFailures.html' },
{ name: 'Broken Aria References', success: 'brokenAriaReferncesSuccess.html', failure: 'brokenAriaReferencesFailures.html' },
{ name: 'Page Title', success: 'pageTitleSuccess.html', failure: 'pageTitleFailures.html' },
{ name: 'Row Table Headers', success: 'rowTableHeadersSuccess.html', failure: 'rowTableHeadersFailures.html' },
{ name: 'Breadcrumbs', success: 'breadcrumbsSuccess.html', failure: 'breadcrumbsFailures.html' },
{ name: 'Column Table Headers', success: 'columnTableHeadersSuccess.html', failure: 'columnTableHeadersFailures.html' },
{ name: 'Footer Landmark', success: 'footerLandmarkSuccess.html', failure: 'footerLandmarkFailures.html' },
{ name: 'Submenu State', success: 'submenuStateSuccess.html', failure: 'submenuStateFailures.html' },
{ name: 'Table Layouts', success: 'tableLayoutsSuccess.html', failure: 'tableLayoutsFailures.html' },
{ name: 'Viewport Scalability', success: 'viewportScalibiltySuccess.html', failure: 'viewportScalibilityFailures.html' },
{ name: 'Viewport Scalability Non Exist', failure: 'viewportScalibilityNonExist.html' },
{ name: 'Search Form Tapping', success: 'searchFormTappingSuccess.html' },
{ name: 'Missing Nav Items', success: 'missingNavItemsSuccess.html', failure: 'missingNavItemsFailures.html' },
{ name: 'Load Auto Focus', success: 'loadAutoFocusSuccess.html', failure: 'loadAutoFocusFailures.html' },
{ name: 'Incorrect Main Landmark', success: 'IncorrectMainLandmarkSuccess.html', failure: 'IncorrectMainLandmarkFailures.html' },
{ name: 'Multiple Popup Focus', failure: 'multiplePopUpfocusFailure.html' },
{ name: 'Alt Text', failure: 'altTextFailres.html' },
{ name: 'Broken Submenu Indication', success: 'brokenSubmenuIndicationSuccess.html', failure: 'brokenSubmenuIndicationFailures.html' },
{ name: 'Embedder', success: 'embedder.html' },
{ name: 'Menu Item Tests', success: 'menuitemtests.html' }
];

const rulesGrid = document.getElementById('rulesGrid');
const sidebarRules = document.getElementById('sidebarRules');
const searchInput = document.getElementById('searchInput');
const totalRules = document.getElementById('totalRules');

totalRules.textContent = rules.length;

function createSafeLink(className, href, text) {
const link = document.createElement('a');
link.className = className;
link.href = href;
link.textContent = text;
return link;
}

function renderRules(filter = '') {
rulesGrid.innerHTML = '';
sidebarRules.innerHTML = '';

const filteredRules = rules.filter(rule =>
rule.name.toLowerCase().includes(filter.toLowerCase())
);

filteredRules.forEach(rule => {
const article = document.createElement('article');
article.className = 'rule-card';

const title = document.createElement('h2');
title.textContent = rule.name;

const actions = document.createElement('div');
actions.className = 'actions';

if (rule.success) {
actions.appendChild(createSafeLink('btn success', rule.success, 'Success'));
}

if (rule.failure) {
actions.appendChild(createSafeLink('btn failure', rule.failure, 'Failure'));
}

article.appendChild(title);
article.appendChild(actions);
rulesGrid.appendChild(article);

const sideLink = createSafeLink('rule-link', rule.success || rule.failure, rule.name);
sidebarRules.appendChild(sideLink);
});

if (filteredRules.length === 0) {
const emptyMessage = document.createElement('p');
emptyMessage.textContent = 'No rules found.';
rulesGrid.appendChild(emptyMessage);
}
}

searchInput.addEventListener('input', function () {
renderRules(this.value);
});

renderRules();

(function () {
const script = document.createElement('script');
const target = document.querySelector('head') || document.body;
script.src = 'https://acsbapp.com/app-flow.js';
script.async = true;
target.appendChild(script);
}());
</script>

</body>
</html>
