<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" href="image (14).png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Accessibility Rules Dashboard</title>

<style>
* {
box-sizing: border-box;
}

body {
font-family: Arial, sans-serif;
margin: 0;
background: #eef3ff;
color: #1f2937;
}

.app {
display: flex;
min-height: 100vh;
}

.sidebar {
width: 270px;
background: #f6f8ff;
border-right: 1px solid #d9e1f2;
padding: 20px;
position: fixed;
top: 0;
bottom: 0;
overflow-y: auto;
}

.logo {
font-size: 22px;
font-weight: bold;
margin-bottom: 5px;
}

.subtitle {
font-size: 13px;
color: #718096;
margin-bottom: 25px;
}

.nav-title {
font-size: 13px;
font-weight: bold;
margin: 20px 0 10px;
color: #4a5568;
}

.rule-link {
display: block;
padding: 10px 12px;
margin-bottom: 6px;
border-radius: 10px;
text-decoration: none;
color: #334155;
font-size: 14px;
}

.rule-link:hover {
background: #e4e9ff;
}

.main {
margin-left: 270px;
width: calc(100% - 270px);
}

.topbar {
height: 70px;
background: white;
display: flex;
align-items: center;
justify-content: space-between;
padding: 0 28px;
box-shadow: 0 2px 10px rgba(0,0,0,.08);
position: sticky;
top: 0;
z-index: 1000;
}

.search {
width: 420px;
max-width: 60%;
padding: 13px 18px;
border: 1px solid #d4dbea;
border-radius: 8px;
font-size: 15px;
}

.user-area {
display: flex;
align-items: center;
gap: 14px;
font-weight: bold;
}

.logout-btn {
background: #dc3545;
color: white;
border: none;
padding: 10px 18px;
border-radius: 8px;
cursor: pointer;
font-weight: bold;
}

.logout-btn:hover {
background: #b02a37;
}

.content {
padding: 30px 34px;
}

h1 {
font-size: 34px;
margin: 0 0 8px;
}

.description {
color: #64748b;
margin-bottom: 30px;
}

.cards {
display: grid;
grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
gap: 18px;
max-width: 800px;
margin-bottom: 30px;
}

.card {
background: white;
border-radius: 14px;
padding: 22px;
box-shadow: 0 8px 20px rgba(31,41,55,.08);
}

.card-number {
font-size: 34px;
font-weight: bold;
color: #5468ff;
}

.card-label {
font-weight: bold;
margin-top: 8px;
}

.panel {
background: white;
border-radius: 14px;
padding: 24px;
box-shadow: 0 8px 20px rgba(31,41,55,.08);
}

.rules-grid {
display: grid;
grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
gap: 16px;
margin-top: 20px;
}

.rule-card {
background: #f8fbff;
border: 1px solid #dbe5f6;
border-radius: 14px;
padding: 16px;
}

.rule-card h2 {
font-size: 17px;
margin: 0 0 12px;
}

.actions {
display: flex;
gap: 10px;
}

.btn {
flex: 1;
text-align: center;
text-decoration: none;
padding: 10px;
border-radius: 8px;
color: white;
font-weight: bold;
font-size: 14px;
}

.success {
background: #28a745;
}

.failure {
background: #dc3545;
}

.hidden {
display: none;
}

@media (max-width: 800px) {
.sidebar {
position: static;
width: 100%;
height: auto;
}

.app {
display: block;
}

.main {
margin-left: 0;
width: 100%;
}

.topbar {
height: auto;
gap: 12px;
flex-direction: column;
align-items: stretch;
padding: 16px;
}

.search {
max-width: 100%;
width: 100%;
}
}
</style>
</head>

<body>


<div class="app">

<aside class="sidebar">
<div class="logo">AccessFlow</div>
<div class="subtitle">QA Testing</div>

<div class="nav-title">Dashboard</div>
<a class="rule-link" href="index.html">Rule Library</a>

<div class="nav-title">Engine Rules</div>
<div id="sidebarRules"></div>
</aside>

<main class="main">

<header class="topbar">
<input id="searchInput" class="search" type="search" placeholder="Search rule by name...">

<div class="user-area">
<span>👤 <span id="loggedUser"></span></span>
<button id="logoutBtn" class="logout-btn" type="button">Logout</button>
</div>
</header>

<section class="content">
<h1>Rule Library</h1>
<p class="description">Browse, test, and validate accessibility rule examples.</p>

<div class="cards">
<div class="card">
<div class="card-number" id="totalRules">0</div>
<div class="card-label">Total Rules</div>
</div>

<div class="card">
<div class="card-number">✅</div>
<div class="card-label">Success Examples</div>
</div>

<div class="card">
<div class="card-number">❌</div>
<div class="card-label">Failure Examples</div>
</div>

<div class="card">
<div class="card-number">🔎</div>
<div class="card-label">Search Enabled</div>
</div>
</div>

<div class="panel">
<strong>Jump to Rule</strong>
<div id="rulesGrid" class="rules-grid"></div>
</div>
</section>

</main>
</div>

<script>
const rules = [
{ name: 'Hidden Visible Content', success: 'hiddenVisibleContentSuccess.html', failure: 'hiddenVisibleContentFailure.html' },
{ name: 'Empty Links', success: 'emptyLinksSuccesses.html', failure: 'emptyLinksFailures.html' },
{ name: 'Untagged Headings', success: 'untaggedHeadingsSuccess.html', failure: 'untaggedHeadingsFailures.html' },
{ name: 'New Window Link', success: 'newWindowLinkSuccess.html', failure: 'newWindowLinkFailures.html' },
{ name: 'Font Size', failure: 'fontSizeFailures.html' },
{ name: 'Missing Form Button', success: 'missingFormButtonSuccess.html', failure: 'missingFormButtonFailures.html' },
{ name: 'Broken List', success: 'brokenListSuccess.html', failure: 'brokenListFailures.html' },
{ name: 'Fake Hidden Interactive', success: 'fakeHiddenInteractiveSuccess.html', failure: 'fakeHiddenInteractiveFailures.html' },
{ name: 'Popup Focus', success: 'popupFocusSuccess.html', failure: 'popupFocusFailures.html' },
{ name: 'Headless Tables', success: 'headlessTablesSuccess.html', failure: 'headlessTablesFailures.html' },
{ name: 'Skip Links', success: 'skipLinksSuccess.html', failure: 'skipLinksFailures.html' },
{ name: 'Carousel Pagination', success: 'carouselPaginationSuccess.html', failure: 'carouselPaginationFailures.html' },
{ name: 'Article Setup', success: 'articleSetupSuccess.html', failure: 'articleSetupFailures.html' },
{ name: 'Broken Aria References', success: 'brokenAriaReferncesSuccess.html', failure: 'brokenAriaReferencesFailures.html' },
{ name: 'Page Title', success: 'pageTitleSuccess.html', failure: 'pageTitleFailures.html' },
{ name: 'Row Table Headers', success: 'rowTableHeadersSuccess.html', failure: 'rowTableHeadersFailures.html' },
{ name: 'Breadcrumbs', success: 'breadcrumbsSuccess.html', failure: 'breadcrumbsFailures.html' },
{ name: 'Column Table Headers', success: 'columnTableHeadersSuccess.html', failure: 'columnTableHeadersFailures.html' },
{ name: 'Footer Landmark', success: 'footerLandmarkSuccess.html', failure: 'footerLandmarkFailures.html' },
{ name: 'Submenu State', success: 'submenuStateSuccess.html', failure: 'submenuStateFailures.html' },
{ name: 'Table Layouts', success: 'tableLayoutsSuccess.html', failure: 'tableLayoutsFailures.html' },
{ name: 'Viewport Scalability', success: 'viewportScalibiltySuccess.html', failure: 'viewportScalibilityFailures.html' },
{ name: 'Viewport Scalability Non Exist', failure: 'viewportScalibilityNonExist.html' },
{ name: 'Search Form Tapping', success: 'searchFormTappingSuccess.html' },
{ name: 'Missing Nav Items', success: 'missingNavItemsSuccess.html', failure: 'missingNavItemsFailures.html' },
{ name: 'Load Auto Focus', success: 'loadAutoFocusSuccess.html', failure: 'loadAutoFocusFailures.html' },
{ name: 'Incorrect Main Landmark', success: 'IncorrectMainLandmarkSuccess.html', failure: 'IncorrectMainLandmarkFailures.html' },
{ name: 'Multiple Popup Focus', failure: 'multiplePopUpfocusFailure.html' },
{ name: 'Alt Text', failure: 'altTextFailres.html' },
{ name: 'Broken Submenu Indication', success: 'brokenSubmenuIndicationSuccess.html', failure: 'brokenSubmenuIndicationFailures.html' },
{ name: 'Embedder', success: 'embedder.html' },
{ name: 'Menu Item Tests', success: 'menuitemtests.html' }
];

const rulesGrid = document.getElementById('rulesGrid');
const sidebarRules = document.getElementById('sidebarRules');
const searchInput = document.getElementById('searchInput');

document.getElementById('totalRules').textContent = rules.length;
document.getElementById('loggedUser').textContent = localStorage.getItem('username') || 'Guest';

function renderRules(filter = '') {
rulesGrid.innerHTML = '';
sidebarRules.innerHTML = '';

const filteredRules = rules.filter(rule =>
rule.name.toLowerCase().includes(filter.toLowerCase())
);

filteredRules.forEach(rule => {
const card = document.createElement('div');
card.className = 'rule-card';

card.innerHTML = `
<h2>${rule.name}</h2>
<div class="actions">
${rule.success ? `<a class="btn success" href="${rule.success}">Success</a>` : ''}
${rule.failure ? `<a class="btn failure" href="${rule.failure}">Failure</a>` : ''}
</div>
`;

rulesGrid.appendChild(card);

const sideLink = document.createElement('a');
sideLink.className = 'rule-link';
sideLink.href = rule.success || rule.failure;
sideLink.textContent = rule.name;
sidebarRules.appendChild(sideLink);
});
}

searchInput.addEventListener('input', function () {
renderRules(this.value);
});

});

renderRules();
</script>
<script>
(function () {
const s = document.createElement('script');
const h = document.querySelector('head') || document.body;
s.src = 'https://acsbapp.com/app-flow.js';
s.async = true;
h.appendChild(s);
}());
</script>


</body>
</html>
